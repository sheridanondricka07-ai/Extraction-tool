<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extraction-tool | Domain & IP Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        textarea {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }
        textarea::-webkit-scrollbar {
            width: 6px;
        }
        textarea::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body class="text-slate-200 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col items-center mb-12 text-center">
            <div class="w-16 h-16 btn-gradient rounded-2xl flex items-center justify-center mb-4 shadow-lg shadow-indigo-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.58 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.58 4 8 4s8-1.79 8-4M4 7c0-2.21 3.58-4 8-4s8 1.79 8 4m0 5c0 2.21-3.58 4-8 4s-8-1.79-8-4" />
                </svg>
            </div>
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-2 tracking-tight">Extraction-tool</h1>
            <p class="text-slate-400 max-w-lg">Intelligent domain and IP address extractor with public suffix normalization.</p>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Input Section -->
            <section class="glass rounded-3xl p-6 flex flex-col space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-semibold flex items-center">
                        <span class="w-2 h-2 bg-indigo-500 rounded-full mr-2"></span>
                        Raw Input
                    </h2>
                    <button id="clearInput" class="text-xs text-slate-500 hover:text-slate-300 transition-colors">Clear All</button>
                </div>
                <textarea id="inputText" class="w-full h-80 bg-slate-950/50 border border-slate-800 rounded-2xl p-4 focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition-all" placeholder="Paste your raw text here (emails, logs, HTML, etc.)..."></textarea>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-2">
                    <div class="flex flex-col space-y-2">
                        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Domain Mode</label>
                        <select id="domainMode" class="bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="root">Root Domains Only (example.com)</option>
                            <option value="full">Full Domains (sub.example.com)</option>
                        </select>
                    </div>
                    <div class="flex flex-col justify-end">
                        <button id="extractBoth" class="btn-secondary rounded-xl p-3 text-sm font-semibold text-indigo-400 border-indigo-500/20 hover:border-indigo-500/50">Extract Both</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button id="extractDomains" class="btn-gradient rounded-xl p-4 font-bold flex items-center justify-center space-x-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M12.586 4.586a2 2 0 112.828 2.828l-3 3a2 2 0 01-2.828 0 1 1 0 00-1.414 1.414 4 4 0 005.656 0l3-3a4 4 0 00-5.656-5.656l-1.5 1.5a1 1 0 101.414 1.414l1.5-1.5zm-5 5a2 2 0 012.828 0 1 1 0 101.414-1.414 4 4 0 00-5.656 0l-3 3a4 4 0 105.656 5.656l1.5-1.5a1 1 0 10-1.414-1.414l-1.5 1.5a2 2 0 11-2.828-2.828l3-3z" clip-rule="evenodd" />
                        </svg>
                        <span>Domains</span>
                    </button>
                    <button id="extractIPs" class="btn-gradient rounded-xl p-4 font-bold flex items-center justify-center space-x-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M2 5a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V5zm3.293 1.293a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 01-1.414-1.414L7.586 10 5.293 7.707a1 1 0 010-1.414zM11 12a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd" />
                        </svg>
                        <span>IPv4</span>
                    </button>
                </div>
            </section>

            <!-- Output Section -->
            <section class="glass rounded-3xl p-6 flex flex-col space-y-4">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-semibold flex items-center">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full mr-2"></span>
                        Extracted Results
                    </h2>
                    <span id="resultCount" class="text-xs bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full border border-emerald-500/20">0 items found</span>
                </div>
                <textarea id="outputText" readonly class="w-full h-80 bg-slate-950/50 border border-slate-800 rounded-2xl p-4 text-sm font-mono text-emerald-400 outline-none transition-all" placeholder="Results will appear here..."></textarea>
                
                <div class="grid grid-cols-2 gap-4 pt-2">
                    <button id="copyBtn" class="btn-secondary rounded-xl p-4 font-semibold flex items-center justify-center space-x-2 hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                        </svg>
                        <span>Copy All</span>
                    </button>
                    <button id="downloadBtn" class="btn-secondary rounded-xl p-4 font-semibold flex items-center justify-center space-x-2 hover:text-white transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                        <span>Download .txt</span>
                    </button>
                </div>

                <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-emerald-600 text-white px-6 py-2 rounded-full text-sm font-semibold opacity-0 transition-all duration-300 shadow-xl shadow-emerald-900/20 pointer-events-none">
                    Copied to clipboard!
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="mt-12 text-center text-slate-500 text-sm">
            &copy; 2026 Extraction-tool &bull; Secure & High-Performance
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
